version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.14" # NOTE: Keep this in sync with noxfile.py
  jobs:
    post_checkout:
      - git fetch --unshallow || true

python:
  install:
    - method: uv
      command: pip
      requirements: requirements/docs.requirements.txt

sphinx:
  builder: html
  configuration: docs/conf.py
  fail_on_warning: true
