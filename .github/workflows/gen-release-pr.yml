name: Generate release Pull Request

on:
  workflow_dispatch:
    inputs:
      next-version:
        description: 'Next version use vX.Y.Z, patch, minor or major'
        default: 'auto'
        required: true
      changie-version:
        description: Version of Changie to use
        default: latest
        required: false
      prerelease:
        description: Prerelease values to append to version
        required: false
      metadata:
        description: Metadata values to append to version
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: {}

env:
  FORCE_COLOR: "1"

jobs:
  generate-pr:
    name: Generate release Pull Request
    runs-on: ubuntu-24.04
    permissions:
      contents: write       # to create a github release
      pull-requests: write  # to create and update PRs
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Batch changes
      uses: miniscruff/changie-action@11bcad388e7973948cbcecb10863baf024d5f607 # v3.0.0
      with:
        version: ${{ github.event.inputs.changie-version }}
        args: "\
          batch
          ${{ github.event.inputs.next-version }}
          ${{ github.event.inputs.prerelease && format('-p {0}', github.event.inputs.prerelease) }}
          ${{ github.event.inputs.metadata && format('-m {0}', github.event.inputs.metadata) }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Merge changes
      uses: miniscruff/changie-action@11bcad388e7973948cbcecb10863baf024d5f607 # v3.0.0
      with:
        version: ${{ github.event.inputs.changie-version }}
        args: merge
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Get the latest version
      id: latest
      uses: miniscruff/changie-action@11bcad388e7973948cbcecb10863baf024d5f607 # v3.0.0
      with:
        version: ${{ github.event.inputs.changie-version }}
        args: latest
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Draft Release
      id: draft-release
      if: ${{ github.event.inputs.prerelease == '' }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        LATEST: ${{ steps.latest.outputs.output }}
      run: |
        url=$(gh release create "$LATEST" \
          --draft \
          --title ${LATEST} \
          --notes-file ".changes/${LATEST}.md")
        echo "url=${url}" >> "$GITHUB_OUTPUT"

    - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
      id: generate-token
      with:
        client-id: ${{ vars.APP_ID }}
        private-key: ${{ secrets.APP_PRIVATE_KEY }}

    - name: Get GitHub App User ID
      id: get-user-id
      run: echo "user-id=$(gh api "/users/${APP_USERNAME}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
      env:
        GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        APP_USERNAME: ${{ steps.generate-token.outputs.app-slug }}

    - name: Configure bot user
      env:
        APP_USER_ID: ${{ steps.get-user-id.outputs.user-id }}
        APP_USERNAME: ${{ steps.generate-token.outputs.app-slug }}
      run: |
        git config --global user.name "${APP_USERNAME}[bot]"
        git config --global user.email "${APP_USER_ID}+${APP_USERNAME}[bot]@users.noreply.github.com"

    - name: Create Pull Request
      env:
        GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        VERSION: ${{ steps.latest.outputs.output }}
        DRAFT_URL: ${{ steps.draft-release.outputs.url }}
      run: |
        branch_name="release/${VERSION}"

        git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        git checkout -b $branch_name
        git add .

        if git diff --staged --quiet; then
          echo "No changes to commit"
          exit 0
        fi

        git commit -m "chore: Release ${VERSION}"
        git fetch origin $branch_name || true
        git push --force-with-lease origin $branch_name

        cat > /tmp/pr-body.md << 'EOF'
        Checklist:

        - [ ] Check that the right version is set in all the files.
        - [ ] Groom the changelog for wording or missing entries.
        - [ ] Check that the integration tests table is up to date.
        EOF
        if [ -n "${DRAFT_URL}" ]; then
          printf '\n\n[Release Draft](%s)\n' "${DRAFT_URL}" >> /tmp/pr-body.md
        fi

        gh pr create \
          --title "chore: Release ${VERSION}" \
          --body-file /tmp/pr-body.md \
          --base main \
          --label Release
