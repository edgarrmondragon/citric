name: Install tools
description: Install tools for Python projects

inputs:
  nox-version:
    description: "The version of Nox to install"
    required: true
  uv-version:
    description: "The version of uv to install"
    required: true

runs:
  using: "composite"
  steps:
  - name: Install uv
    uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
    with:
      version: ${{ inputs.uv-version }}

  - name: Install Nox
    env:
      NOX_VERSION: ${{ inputs.nox-version }}
    shell: bash
    run: |
      uv tool install --with nox==${NOX_VERSION} nox
      nox --version
