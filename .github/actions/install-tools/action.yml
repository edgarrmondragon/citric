name: Install tools
description: Install tools for Python projects

inputs:
  nox-version:
    description: "The version of Nox to install"
    required: true
  uv-version:
    description: "The version of uv to install"
    required: true

runs:
  using: "composite"
  steps:
  - name: Install uv
    uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
    with:
      version: ${{ inputs.uv-version }}

  - name: Install Nox
    env:
      NOX_VERSION: ${{ inputs.nox-version }}
    shell: bash
    run: |
      uv tool install --with nox==${NOX_VERSION} nox
      nox --version
